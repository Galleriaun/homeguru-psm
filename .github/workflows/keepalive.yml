name: Supabase keepalive

# Prevents the Supabase free-tier project from auto-pausing after 7 days
# of inactivity. Pings the REST API every 6 days.

on:
  schedule:
    - cron: '0 9 */6 * *'  # every 6 days at 09:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST endpoint
        run: |
          curl -fsS "$URL/rest/v1/message_templates?select=id&limit=1" \
            -H "apikey: $KEY" \
            -H "Authorization: Bearer $KEY"
        env:
          URL: ${{ secrets.VITE_SUPABASE_URL }}
          KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
