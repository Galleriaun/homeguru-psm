<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#059669" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />

    <!-- Apply theme BEFORE first paint to prevent flash of wrong theme.
         Mirrors the logic in src/lib/theme.ts. Must stay in sync. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('homeguru-theme');
          var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = stored === 'dark' || ((stored === 'system' || !stored) && systemDark);
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {
          // localStorage unavailable — default to light
        }
      })();
    </script>

    <!-- PWA support (mobile-web-app-capable is the standardized name;
         apple-mobile-web-app-capable kept for older iOS versions) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HomeGuru" />
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-180.png" />

    <title>HomeGuru PMS</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
